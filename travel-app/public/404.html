<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect — preserves path on hard refresh / direct link
    var path = window.location.pathname.replace('/Travel-app', '') || '/'
    sessionStorage.setItem('redirect', path)
    window.location.replace('/Travel-app/')
  </script>
</head>
</html>
